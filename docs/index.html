<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetrisVPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            color: var(--text);
            /* Фон с каплями */
            background: radial-gradient(circle at center, #2c3e50, #000000);
            overflow: hidden;
        }

        /* Эффект капель */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/rain.png');
            opacity: 0.15; pointer-events: none;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; z-index: 1;
            padding: 20px;
        }

        h1 { font-weight: 200; letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; }

        .capsule {
            width: 100%; max-width: 320px; padding: 18px 25px;
            margin: 10px; border-radius: 50px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; font-weight: 500; letter-spacing: 1px;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .capsule:nth-child(2) { animation-delay: 0.2s; }
        .capsule:nth-child(3) { animation-delay: 0.4s; }
        .capsule:nth-child(4) { animation-delay: 0.6s; }

        .capsule:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .capsule:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #toast {
            position: fixed; bottom: 50px; padding: 15px 30px;
            background: white; color: black; border-radius: 50px;
            font-weight: bold; display: none; animation: pop 0.3s;
        }
        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aetris</h1>
        <div class="capsule" onclick="copy('ЧС')">ЧЕРНЫЙ СПИСОК</div>
        <div class="capsule" onclick="copy('Белый')">БЕЛЫЙ СПИСОК</div>
        <div class="capsule" onclick="copy('Лайт')">ЛАЙТ РЕЖИМ</div>
    </div>

    <div id="toast">СКОПИРОВАНО</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        async function copy(type) {
            const urls = {
                'ЧС': 'https://raw.githubusercontent.com/flaafix/AetrisVPN-black-list/refs/heads/main/configs.txt',
                'Белый': 'https://raw.githubusercontent.com/flaafix/AetrisVPN/refs/heads/main/AetrisVPN.txt',
                'Лайт': 'https://raw.githubusercontent.com/flaafix/AetrisVPN-white-list-lite/refs/heads/main/AetrisVPN.txt'
            };
            const btn = event.currentTarget;
            btn.style.borderColor = "white";
            
            try {
                const res = await fetch(urls[type]);
                const text = await res.text();
                await navigator.clipboard.writeText(text);
                tg.HapticFeedback.notificationOccurred('success');
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            } catch (e) { alert("Ошибка"); }
            btn.style.borderColor = "rgba(255,255,255,0.1)";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetrisVPN Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }
        #toast { position: fixed; bottom: 20px; background: var(--accent); padding: 10px 20px; border-radius: 30px; display: none; }
    </style>
</head>
<body>
    <h1>AetrisVPN</h1>
    <div class="card" onclick="copy('ЧС')"><h3>Черный список</h3><p>Максимальная скорость</p></div>
    <div class="card" onclick="copy('Белый')"><h3>Белый список</h3><p>Стабильный доступ</p></div>
    <div class="card" onclick="copy('Лайт')"><h3>Лайт-режим</h3><p>Экономия трафика</p></div>
    <div id="toast">✅ Скопировано в буфер!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        async function copy(type) {
            const urls = {
                'ЧС': 'https://raw.githubusercontent.com/flaafix/AetrisVPN-black-list/refs/heads/main/configs.txt',
                'Белый': 'https://raw.githubusercontent.com/flaafix/AetrisVPN/refs/heads/main/AetrisVPN.txt',
                'Лайт': 'https://raw.githubusercontent.com/flaafix/AetrisVPN-white-list-lite/refs/heads/main/AetrisVPN.txt'
            };
            const btn = event.currentTarget;
            btn.style.opacity = "0.5";
            try {
                const res = await fetch(urls[type]);
                const text = await res.text();
                await navigator.clipboard.writeText(text);
                tg.HapticFeedback.notificationOccurred('success');
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            } catch (e) { alert("Ошибка загрузки"); }
            btn.style.opacity = "1";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetris Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh;
        }

        .container { 
            width: 90%; /* Ограничение 90% от ширины экрана */
            max-width: 320px; /* Кнопки не будут шире 320px */
            display: flex; flex-direction: column; gap: 15px; 
        }

        .capsule {
            width: 100%; padding: 16px; border-radius: 50px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-size: 13px; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s;
        }

        /* Уведомление строго по центру */
        #toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; font-size: 12px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.hide { opacity: 0; transform: translateX(-50%) translateY(20px); }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="letter-spacing: 8px;">AETRIS</h2>
        <div class="capsule" onclick="copy('ЧС')">ЧЕРНЫЙ СПИСОК</div>
        <div class="capsule" onclick="copy('Белый')">БЕЛЫЙ СПИСОК</div>
        <div class="capsule" onclick="copy('Лайт')">ЛАЙТ РЕЖИМ</div>
    </div>

    <div id="toast">СКОПИРОВАНО</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function copy(type) {
            const urls = {
                'ЧС': '...', 'Белый': '...', 'Лайт': '...'
            };
            
            await navigator.clipboard.writeText(urls[type]);
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            // Анимация исчезновения
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.classList.remove('hide'), 400);
            }, 2000);
        }
    </script>
</body>
</html>
